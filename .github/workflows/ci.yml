name: ci

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package + test deps
        run: |
          python -m pip install --upgrade pip
          pip install ".[test]" || pip install . pytest httpx pytest-asyncio
          pip install pyyaml

      - name: Build sdist + wheel
        run: |
          pip install build
          python -m build

      - name: Smoke import
        run: |
          python -c "from a2a_backend_kit import make_app, install_bearer_auth, KitContextBuilder, make_store, setup_otel, PeerRegistry, BearerCredential, build_text_agent_card; print('ok')"
